<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRAPH PRO DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:15px;
background:#1e293b;
text-align:center;
}

section{
margin:15px;
padding:15px;
background:#1e293b;
border-radius:12px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:linear-gradient(135deg,#38bdf8,#a855f7);
color:white;
cursor:pointer;
font-weight:bold;
}

canvas{max-height:420px;}

/* RAPPORTS HORIZONTAL */
#reportsGrid{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.card{
background:linear-gradient(145deg,#0f172a,#1e293b);
padding:12px;
border-radius:12px;
min-width:250px;
flex:1;
border:1px solid rgba(255,255,255,0.08);
}

.card h4{color:#38bdf8;margin:0;}

.card-actions{
display:flex;
gap:8px;
margin-top:10px;
}

.card-actions button{
flex:1;
padding:8px;
font-size:12px;
}

</style>
</head>

<body>

<header>
<h2>GRAPH PRO DASHBOARD</h2>
</header>

<section>

<select id="chartType">
<option value="line">Line</option>
<option value="bar">Bar</option>
<option value="pie">Pie</option>
<option value="doughnut">Doughnut</option>
<option value="radar">Radar</option>
<option value="polarArea">Polar Area</option>
</select>

<input id="title" placeholder="Titre">
<input id="desc" placeholder="Description">
<input id="labels" value="Jan,Fév,Mar,Avr">
<input id="data" value="120,200,150,300">

<br>

<button onclick="update()">Créer</button>
<button onclick="save()">Sauvegarder</button>
<button onclick="exportPDF()">PDF A5</button>

<canvas id="chart"></canvas>

</section>

<section>
<h3>Rapports</h3>
<div id="reportsGrid"></div>
</section>

<script>

let chart;
let reports = JSON.parse(localStorage.getItem("reports") || "[]");

const palette = [
"#38bdf8","#22c55e","#f97316","#a855f7",
"#ef4444","#eab308","#14b8a6","#f472b6",
"#60a5fa","#34d399","#f87171","#c084fc"
];

/* ================= UPDATE CHART ================= */

function update(){

const type = document.getElementById("chartType").value;
const title = document.getElementById("title").value;
const labels = document.getElementById("labels").value.split(",");
const data = document.getElementById("data").value.split(",").map(Number);
const desc = document.getElementById("desc").value;

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{

plugins:[ChartDataLabels],

type:type,

data:{
labels:labels,
datasets:[{
label:title,
data:data,
backgroundColor:palette,
borderColor:"#fff",
borderWidth:2,

datalabels:{
color:"#fff",
font:{weight:"bold"},
formatter:(value,ctx)=>{
const sum = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
return ((value*100)/sum).toFixed(1)+"%";
}
}
}]
},

options:{
responsive:true,
plugins:{
legend:{labels:{color:"white"}},
title:{
display:true,
text:title + (desc ? " — " + desc : ""),
color:"white"
}
}
}

});

}

/* ================= SAVE ================= */

function save(){

reports.push({
id:Date.now(),
type:chartType.value,
title:title.value,
desc:desc.value,
labels:labels.value,
data:data.value,
date:new Date().toLocaleString()
});

if(reports.length>10) reports.shift();

localStorage.setItem("reports",JSON.stringify(reports));

render();

}

/* ================= RENDER ================= */

function render(){

const grid=document.getElementById("reportsGrid");
grid.innerHTML="";

reports.slice().reverse().forEach(r=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h4>${r.title}</h4>
<p style="font-size:12px;opacity:0.8">${r.desc || ""}</p>
<p style="font-size:11px">${r.date}</p>

<div class="card-actions">
<button onclick="loadReport(${r.id})">Ouvrir</button>
<button onclick="deleteReport(${r.id})">Supprimer</button>
</div>
`;

grid.appendChild(div);

});

}

/* ================= LOAD ================= */

function loadReport(id){

const r = reports.find(x=>x.id===id);
if(!r) return;

chartType.value=r.type;
title.value=r.title;
desc.value=r.desc;
labels.value=r.labels;
data.value=r.data;

update();

}

/* ================= DELETE ================= */

function deleteReport(id){

reports = reports.filter(r=>r.id!==id);
localStorage.setItem("reports",JSON.stringify(reports));
render();

}

async function exportPDF(){

const { jsPDF } = window.jspdf;
const pdf = new jsPDF({ format: "a5" });

let y = 10;

pdf.setFontSize(14);
pdf.text("RAPPORT GRAPHIQUE COMPLET", 10, y);
y += 10;

for(const r of reports){

pdf.setFontSize(11);
pdf.text("Titre: " + r.title, 10, y);
y += 6;

pdf.setFontSize(9);
pdf.text("Description: " + (r.desc || "—"), 10, y);
y += 6;

pdf.text("Date: " + r.date, 10, y);
y += 8;

/* CANVAS TEMPORAIRE */
const canvas = document.createElement("canvas");
canvas.width = 600;
canvas.height = 300;

const ctx = canvas.getContext("2d");

/* IMPORTANT : chart avec datalabels activé */
const tempChart = new Chart(ctx,{

type: r.type,

plugins:[ChartDataLabels],

data:{
labels: r.labels.split(","),
datasets:[{
label: r.title,
data: r.data.split(",").map(Number),
backgroundColor: [
"#38bdf8","#22c55e","#f97316","#a855f7",
"#ef4444","#eab308","#14b8a6","#f472b6"
],
borderColor:"#fff",
borderWidth:2,

datalabels:{
color:"#fff",
font:{weight:"bold", size:12},
formatter:(value,ctx)=>{
const data = ctx.chart.data.datasets[0].data;
const total = data.reduce((a,b)=>a+b,0);
return ((value * 100) / total).toFixed(1) + "%";
}
}
}]
},

options:{
responsive:false,
animation:false,
plugins:{
legend:{labels:{color:"white"}}
}
}

});

/* 🔥 attendre vrai rendu Chart.js */
await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

/* convertir en image */
const img = canvas.toDataURL("image/png");

pdf.addImage(img, "PNG", 10, y, 120, 60);

y += 70;

if(y > 130){
pdf.addPage();
y = 10;
}

}

/* SIGNATURE PRO */
pdf.setFontSize(10);
pdf.setTextColor(120);

pdf.text("Créé par ETS LesFacilitateurs Groupe", 10, 190);
pdf.text("WhatsApp: +237 651 475 255 / +237 670 035 609", 10, 197);

pdf.save("rapport-graphique.pdf");
}

</script>

</body>
</html>
