<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRAPH PRO DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:15px;
background:#1e293b;
}

section{
margin:15px;
padding:15px;
background:#1e293b;
border-radius:12px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:#38bdf8;
cursor:pointer;
font-weight:bold;
}

canvas{max-height:420px;}

.card{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<h2>GRAPH PRO</h2>
</header>

<section>

<select id="chartType">
<option value="line">Line</option>
<option value="bar">Bar</option>
<option value="pie">Pie</option>
<option value="doughnut">Doughnut</option>
<option value="radar">Radar</option>
<option value="polarArea">Polar Area</option>
</select>

<input id="title" placeholder="Titre">
<input id="desc" placeholder="Description">
<input id="labels" value="Jan,Fév,Mar,Avr">
<input id="data" value="120,200,150,300">

<br>

<button onclick="update()">Créer</button>
<button onclick="save()">Sauvegarder</button>
<button onclick="exportPDF()">PDF A5</button>

<canvas id="chart"></canvas>

</section>

<section>
<h3>Rapports</h3>
<div id="reportsGrid"></div>
</section>

<script>

let chart;

let reports = JSON.parse(localStorage.getItem("reports") || "[]");

const palette = [
"#38bdf8","#22c55e","#f97316","#a855f7",
"#ef4444","#eab308","#14b8a6","#f472b6"
];

/* ================= CREATE ================= */

function update(){

const type = document.getElementById("chartType").value;
const title = document.getElementById("title").value;
const labels = document.getElementById("labels").value.split(",");
const data = document.getElementById("data").value.split(",").map(Number);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type,
data:{
labels,
datasets:[{
label:title,
data,
backgroundColor:palette,
borderColor:"#fff",
borderWidth:2
}]
}
});

}

/* ================= SAVE ================= */

function save(){

reports.push({
id:Date.now(),
type:chartType.value,
title:title.value,
desc:desc.value,
labels:labels.value,
data:data.value,
date:new Date().toLocaleString()
});

if(reports.length>10) reports.shift();

localStorage.setItem("reports",JSON.stringify(reports));

render();
}

/* ================= RENDER ================= */

function render(){

const grid=document.getElementById("reportsGrid");
grid.innerHTML="";

reports.slice().reverse().forEach(r=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h4>${r.title}</h4>
<p>${r.desc || ""}</p>
<p>${r.date}</p>

<button onclick="loadReport(${r.id})">
Ouvrir
</button>
`;

grid.appendChild(div);

});

}

/* ================= LOAD ================= */

function loadReport(id){

const r = reports.find(x=>x.id===id);
if(!r) return;

chartType.value=r.type;
title.value=r.title;
desc.value=r.desc;
labels.value=r.labels;
data.value=r.data;

update();

}

/* ================= PDF ================= */

async function exportPDF(){

const { jsPDF } = window.jspdf;

const pdf = new jsPDF({format:"a5"});

let y=10;

pdf.text("RAPPORT GRAPHIQUE",10,y);
y+=10;

for(let r of reports){

pdf.text("Titre: "+r.title,10,y); y+=6;
pdf.text("Desc: "+(r.desc||""),10,y); y+=6;
pdf.text("Date: "+r.date,10,y); y+=8;

}

pdf.save("rapport.pdf");
}

/* INIT */

update();

</script>

</body>
</html>
