<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAPH PRO DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:15px;
text-align:center;
background:#1e293b;
font-weight:bold;
}

section{
margin:15px;
padding:15px;
background:#1e293b;
border-radius:12px;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
background:linear-gradient(135deg,#38bdf8,#a855f7);
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

canvas{max-height:420px;}

/* RAPPORTS HORIZONTAL */
#reportsGrid{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.card{
background:#0f172a;
padding:12px;
border-radius:12px;
min-width:240px;
flex:1;
border:1px solid rgba(255,255,255,0.08);
}

.card h4{
color:#38bdf8;
margin:0;
}

.card-actions{
display:flex;
gap:6px;
margin-top:10px;
}

.card-actions button{
flex:1;
font-size:12px;
padding:6px;
}
</style>
</head>

<body>

<header>
GRAPH PRO DASHBOARD
</header>

<section>

<select id="chartType">
<option value="line">Line</option>
<option value="bar">Bar</option>
<option value="pie">Pie</option>
<option value="doughnut">Doughnut</option>
<option value="radar">Radar</option>
<option value="polarArea">Polar Area</option>
</select>

<input id="title" placeholder="Titre">
<input id="desc" placeholder="Description">
<input id="labels" value="Jan,Fév,Mar,Avr">
<input id="data" value="120,200,150,300">

<br>

<button onclick="createChart()">Créer</button>
<button onclick="saveReport()">Sauvegarder</button>
<button onclick="exportPDF()">PDF A5</button>

<canvas id="chart"></canvas>

</section>

<section>
<h3>Rapports</h3>
<div id="reportsGrid"></div>
</section>

<script>

let chart;
let reports = JSON.parse(localStorage.getItem("reports") || "[]");

const palette = [
"#38bdf8","#22c55e","#f97316","#a855f7",
"#ef4444","#eab308","#14b8a6","#f472b6",
"#60a5fa","#34d399"
];

/* ================= CHART ================= */

function createChart(){

if(chart) chart.destroy();

const type = document.getElementById("chartType").value;
const title = document.getElementById("title").value;
const desc = document.getElementById("desc").value;
const labels = document.getElementById("labels").value.split(",");
const data = document.getElementById("data").value.split(",").map(Number);

const ctx = document.getElementById("chart");

const isCircle = ["pie","doughnut","polarArea"].includes(type);

chart = new Chart(ctx,{
type:type,
data:{
labels,
datasets:[{
label:title,
data,
backgroundColor: isCircle ? palette : "#38bdf8",
borderColor:"#fff",
borderWidth:2
}]
},
options:{
responsive:true,
plugins:{
legend:{labels:{color:"white"}},
title:{
display:true,
text:title + (desc ? " - " + desc : ""),
color:"white"
},
datalabels:{
formatter:(value,ctx)=>{
if(!isCircle) return "";
const sum = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
return ((value*100)/sum).toFixed(1)+"%";
},
color:"white"
}
}
},
plugins:[ChartDataLabels]
});

}

/* ================= SAVE ================= */

function saveReport(){

reports.push({
id:Date.now(),
type:chartType.value,
title:title.value,
desc:desc.value,
labels:labels.value,
data:data.value,
date:new Date().toLocaleString()
});

if(reports.length>10) reports.shift();

localStorage.setItem("reports",JSON.stringify(reports));
renderReports();

}

/* ================= RENDER ================= */

function renderReports(){

const grid = document.getElementById("reportsGrid");
grid.innerHTML="";

reports.slice().reverse().forEach(r=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h4>${r.title}</h4>
<p>${r.desc || ""}</p>
<p style="font-size:12px">${r.date}</p>

<div class="card-actions">
<button onclick="loadReport(${r.id})">Ouvrir</button>
<button onclick="deleteReport(${r.id})">Supprimer</button>
</div>
`;

grid.appendChild(div);

});

}

/* ================= LOAD ================= */

function loadReport(id){

const r = reports.find(x=>x.id===id);
if(!r) return;

chartType.value=r.type;
title.value=r.title;
desc.value=r.desc;
labels.value=r.labels;
data.value=r.data;

createChart();

}

/* ================= DELETE ================= */

function deleteReport(id){

reports = reports.filter(r=>r.id!==id);
localStorage.setItem("reports",JSON.stringify(reports));
renderReports();

}

/* ================= PDF PRO ================= */

async function exportPDF(){

const { jsPDF } = window.jspdf;
const pdf = new jsPDF({format:"a5"});

for(let i=0;i<reports.length;i++){

const r = reports[i];

if(i>0) pdf.addPage();

pdf.setFontSize(12);
pdf.text("RAPPORT GRAPHIQUE",10,10);

pdf.setFontSize(10);
pdf.text("Titre: " + r.title,10,20);
pdf.text("Desc: " + (r.desc||""),10,28);
pdf.text("Date: " + r.date,10,36);

/* canvas export */
const canvas = document.createElement("canvas");
canvas.width = 600;
canvas.height = 300;

const ctx = canvas.getContext("2d");

new Chart(ctx,{
type:r.type,
data:{
labels:r.labels.split(","),
datasets:[{
data:r.data.split(",").map(Number),
backgroundColor:palette,
borderColor:"#fff"
}]
},
options:{animation:false,responsive:false}
});

await new Promise(res=>setTimeout(res,400));

const img = canvas.toDataURL("image/png");
pdf.addImage(img,"PNG",10,45,130,70);

/* signature */
pdf.setFontSize(8);
pdf.text("Créé par ETS Lesfacilitateurs Groupe",10,135);
pdf.text("WhatsApp +237651475255 / +237670035609",10,142);

}

pdf.save("rapport-pro.pdf");
}

window.onload = ()=>{
renderReports();
createChart();
}

</script>

</body>
</html>
